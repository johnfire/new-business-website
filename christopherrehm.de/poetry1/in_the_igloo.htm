<body text="#C0C0C0" bgcolor="#000000">

<p><font face="Bradley Hand ITC" size="6"><strong><em>In the Igloo</em></strong></font></p>
<p><font face="Bradley Hand ITC" size="6"><strong><em>in the igloo</em></strong></font></p>
<p><font face="Bradley Hand ITC" size="6"><strong><em>its time to hide</em></strong></font></p>
<p><font face="Bradley Hand ITC" size="6"><strong><em>from the snow outside</em></strong></font></p>
<p><font face="Bradley Hand ITC" size="6"><strong><em>the icy night is here</em></strong></font></p>
<p><font face="Bradley Hand ITC" size="6"><strong><em>for days on end</em></strong></font></p>
<p>&nbsp;</p>
<p><font face="Bradley Hand ITC" size="6"><strong><em>we are in the igloo</em></strong></font></p>
<p><font face="Bradley Hand ITC" size="6"><strong><em>alone and warm</em></strong></font></p>
<p><font face="Bradley Hand ITC" size="6"><strong><em>hiding from the burning cold</em></strong></font></p>
<p><font face="Bradley Hand ITC" size="6"><strong><em>the darkness , acid ice</em></strong></font></p>
<p><font face="Bradley Hand ITC" size="6"><strong><em>in the igloo</em></strong></font></p>
<p><font face="Bradley Hand ITC" size="6"><strong><em>the safe place</em></strong></font></p>
<p><font face="Bradley Hand ITC" size="6"><strong><em>a world outside</em></strong></font></p>
<p><font face="Bradley Hand ITC" size="6"><strong><em>not the time to face</em></strong></font></p>
<p>&nbsp;</p>
